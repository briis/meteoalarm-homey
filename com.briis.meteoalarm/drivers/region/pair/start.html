<html>
<head>
  <style>
    body { padding: 16px; font-family: sans-serif; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    .error { color: #c00; margin-top: 12px; }
    .info { color: #4a9; margin-top: 12px; font-size: 13px; }
    .suggestions { margin-top: 8px; }
    .suggestions summary { cursor: pointer; color: #888; font-size: 13px; }
    .suggestions ul { max-height: 160px; overflow-y: auto; margin: 8px 0 0; padding-left: 18px; }
    .suggestions li { cursor: pointer; padding: 2px 0; }
    .suggestions li:hover { text-decoration: underline; }
    button { margin-top: 20px; }
  </style>
</head>
<body>
  <h2 id="pageTitle"></h2>

  <label id="countryLabel"></label>
  <input id="country" />
  <div class="hint" id="countryHint"></div>

  <label id="provinceLabel"></label>
  <input id="province" />
  <div class="hint" id="provinceHint"></div>

  <label id="languageLabel"></label>
  <input id="language" value="en" />
  <div class="hint" id="languageHint"></div>

  <label id="nameLabel"></label>
  <input id="name" />

  <div id="error" class="error"></div>
  <div id="info" class="info"></div>
  <div id="suggestions"></div>

  <button id="continueBtn" class="homey-button-primary-full"></button>

  <script type="text/javascript">
    Homey.setTitle('MeteoAlarm');

    document.getElementById('pageTitle').textContent = Homey.__('pair.title');
    document.getElementById('countryLabel').textContent = Homey.__('pair.country.label');
    document.getElementById('country').placeholder = Homey.__('pair.country.placeholder');
    document.getElementById('countryHint').textContent = Homey.__('pair.country.hint');
    document.getElementById('provinceLabel').textContent = Homey.__('pair.province.label');
    document.getElementById('province').placeholder = Homey.__('pair.province.placeholder');
    document.getElementById('provinceHint').textContent = Homey.__('pair.province.hint');
    document.getElementById('languageLabel').textContent = Homey.__('pair.language.label');
    document.getElementById('language').placeholder = Homey.__('pair.language.placeholder');
    document.getElementById('languageHint').textContent = Homey.__('pair.language.hint');
    document.getElementById('nameLabel').textContent = Homey.__('pair.name.label');
    document.getElementById('name').placeholder = Homey.__('pair.name.placeholder');
    document.getElementById('continueBtn').textContent = Homey.__('pair.continue');

    function showSuggestions(available) {
      const box = document.getElementById('suggestions');
      if (!available || available.length === 0) {
        box.innerHTML = '';
        return;
      }
      const items = available.map((a) => '<li>' + a.replace(/</g, '&lt;') + '</li>').join('');
      box.innerHTML =
        '<details class="suggestions" open>' +
        '<summary>' + Homey.__('pair.suggestions.summary', { count: available.length }) + '</summary>' +
        '<ul>' + items + '</ul>' +
        '</details>';
      box.querySelectorAll('li').forEach((li, i) => {
        li.addEventListener('click', () => {
          document.getElementById('province').value = available[i];
        });
      });
    }

    document.getElementById('continueBtn').addEventListener('click', async () => {
      const country = document.getElementById('country').value.trim().toLowerCase();
      const province = document.getElementById('province').value.trim();
      const language = document.getElementById('language').value.trim() || 'en';
      const name = document.getElementById('name').value.trim();
      const errorEl = document.getElementById('error');
      const infoEl = document.getElementById('info');
      errorEl.textContent = '';
      infoEl.textContent = '';
      showSuggestions(null);

      if (!country || !province) {
        errorEl.textContent = Homey.__('pair.error.fillBoth');
        return;
      }

      try {
        const result = await Homey.emit('validate', { country, province, language, name });
        if (!result.ok) {
          errorEl.textContent = Homey.__('pair.error.validateFailed') + result.error;
          return;
        }
        if (!result.countryValid) {
          errorEl.textContent = Homey.__('pair.error.unrecognizedCountry', { country });
          return;
        }
        if (result.matched) {
          infoEl.textContent = Homey.__('pair.info.matchFound', { areaDesc: result.areaDesc });
        } else if (result.entryCount === 0) {
          infoEl.textContent = Homey.__('pair.info.noActiveAlerts', { country });
        } else {
          infoEl.textContent = Homey.__('pair.info.noMatch', { province, count: result.entryCount });
          showSuggestions(result.available);
        }
        Homey.showView('list_devices');
      } catch (err) {
        errorEl.textContent = Homey.__('pair.error.generic') + (err.message || err);
      }
    });
  </script>
</body>
</html>
